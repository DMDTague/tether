services:
  - type: web
    name: tether-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tether-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tether-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: WEATHER_API_KEY
        sync: false

  - type: redis
    name: tether-redis
    ipAllowList: []

databases:
  - name: tether-db
    databaseName: tether
    user: tether_user
